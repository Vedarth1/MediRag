server:
  port: 8080

spring:
  application:
    name: medirag-gateway

  cloud:
    gateway:
      routes:

        # Auth Service — /api/auth/**  →  http://auth-service:8081
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        # Appointment Service — /api/appointments/**  →  http://appointment-service:8082
        - id: appointment-service
          uri: http://appointment-service:8082
          predicates:
            - Path=/api/appointments/**

        # Health & Wellness — /api/health/**  →  http://health-service:8083
        - id: health-service
          uri: http://health-service:8083
          predicates:
            - Path=/api/health/**

        # Mental Health — /api/mental-health/**  →  http://mental-health-service:8084
        - id: mental-health-service
          uri: http://mental-health-service:8084
          predicates:
            - Path=/api/mental-health/**

        # AI Diagnostic — /api/diagnostics/**  →  http://diagnostic-service:8085
        - id: diagnostic-service
          uri: http://diagnostic-service:8085
          predicates:
            - Path=/api/diagnostics/**

# Local dev profile overrides (for running gateway outside Docker)
---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: appointment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/appointments/**
        - id: health-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/health/**
        - id: mental-health-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/mental-health/**
        - id: diagnostic-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/diagnostics/**

management:
  endpoints:
    web:
      exposure:
        include: health, info