server:
  port: 8085

spring:
  application:
    name: diagnostic-service

  datasource:
    url: jdbc:postgresql://postgres:5432/medirag_db?currentSchema=diagnostic
    username: medirag
    password: medirag123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: diagnostic
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

jwt:
  secret: "3f8a2b1c9d4e7f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4"

minio:
  endpoint: http://minio:9000
  presigned-endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  scan-bucket: medirag-scans
  report-bucket: medirag-reports
  presigned-expiry-minutes: 15
  public-url: http://localhost:9000

openai:
  api-key: ${OPENAI_API_KEY:your-openai-key}
  api-url: https://api.groq.com/openai/v1/chat/completions
  model: meta-llama/llama-4-scout-17b-16e-instruct

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/medirag_db?currentSchema=diagnostic
minio:
  endpoint: http://localhost:9000
  presigned-endpoint: http://localhost:9000
  public-url: http://localhost:9000